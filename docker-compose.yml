services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - app-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
    entrypoint: >
      /bin/sh -c "i=0; while [ $$i -lt 30 ]; do /opt/mssql-tools18/bin/sqlcmd -S tcp:sqlserver,1433 -U sa -P \"$$SA_PASSWORD\" -C -Q \"IF DB_ID('auth_db') IS NULL EXEC('CREATE DATABASE auth_db;'); IF DB_ID('customer_order_db') IS NULL EXEC('CREATE DATABASE customer_order_db;');\" && exit 0; i=$$((i+1)); sleep 2; done; exit 1"
    restart: "no"

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=auth_db;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=86400000
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: on-failure

  customer-order:
    build:
      context: ./customer-order
      dockerfile: Dockerfile
    container_name: customer-order
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=customer_order_db;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: on-failure

  frontend:
    profiles:
      - frontend
    build:
      context: ../Prueba-tecnica-torres-frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "4200:80"
    depends_on:
      - auth-service
      - customer-order
    networks:
      - app-network
    restart: on-failure

networks:
  app-network:
    driver: bridge

volumes:
  sqlserver_data: